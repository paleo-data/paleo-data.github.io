<style>
  .obf-email::before { content: "{{ include.user | default: site.email_user }}"; }
  .obf-email::after { content: "@{{ include.domain | default: site.email_domain }}"; }
</style>
<a class="obf-email" href="#" id="obf-link"></a>

<script>
  (function() {
    var u = "{{ include.user | default: site.email_user }}";
    var d = "{{ include.domain | default: site.email_domain }}";
    var el = document.getElementById("obf-link");
    el.href = "mailto:" + u + "@" + d;
  })();
</script>
